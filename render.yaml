# ArkJoy Restaurant — Render Blueprint
# https://render.com/docs/blueprint-spec

databases:
  - name: arkjoy-db
    plan: free
    databaseName: arkjoy
    user: arkjoy

services:
  - type: web
    name: arkjoy-web
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --production=false && npx prisma generate && npx prisma db push && npx tsx prisma/seed.ts && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: DATABASE_URL
        fromDatabase:
          name: arkjoy-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
